services:
  timescale:
    image: timescale/timescaledb-ha:latest-pg17
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-aio}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - timescale_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_preload_libraries=timescaledb
      -c timescaledb.toolkit_management=true
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:latest
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis}
    command: >
      redis-server
      --appendonly yes
      --requirepass "$REDIS_PASSWORD"
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '-q',
          '--spider',
          'http://localhost:9000/minio/health/live',
        ]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:latest
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
    ports:
      - '${MOSQUITTO_PORT:-1883}:1883'
      - '${MOSQUITTO_WS_PORT:-1884}:1884'
      - '${MOSQUITTO_MQTTS_PORT:-8883}:8883'
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
