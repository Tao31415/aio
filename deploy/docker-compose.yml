version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-aio}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api
    ports:
      - '${PORT:-30000}:30000'
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-30000}
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-aio}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: web
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE=http://localhost:30000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
