version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-aio}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  timescale:
    image: timescale/timescaledb:latest-pg16
    environment:
      - POSTGRES_USER=${TS_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${TS_DB_PASSWORD:-postgres}
      - POSTGRES_DB=${TS_DB_NAME:-timeseries}
    ports:
      - '${TS_DB_PORT:-5433}:5432'
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${TS_DB_USER:-postgres} -p 5432']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '-q',
          '--spider',
          'http://localhost:9000/minio/health/live',
        ]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - '${MOSQUITTO_PORT:-1883}:1883'
      - '${MOSQUITTO_WS_PORT:-1884}:1884'
      - '${MOSQUITTO_MQTTS_PORT:-8883}:8883'
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'timeout 5s bash -c "cat < /dev/null > /dev/tcp/localhost/1883" || exit 0',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api
    env_file:
      - ../apps/api/.env.production
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-aio}
      - TS_DB_HOST=timescale
      - TS_DB_PORT=5432
      - TS_DB_USER=${TS_DB_USER:-postgres}
      - TS_DB_PASSWORD=${TS_DB_PASSWORD:-postgres}
      - TS_DB_NAME=${TS_DB_NAME:-timeseries}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: web
    env_file:
      - ../apps/web/.env.production
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE=http://api:3000
      - PORT=3000
    expose:
      - '3000'
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - '${NGINX_PORT:-80}:80'
      - '${NGINX_SSL_PORT:-443}:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    environment:
      - DOZZLE_NO_ANALYTICS=true
    ports:
      - '${DOZZLE_PORT:-8080}:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  postgres_data:
  timescale_data:
  minio_data:
  mosquitto_data:
  mosquitto_log:
  nginx_logs:
