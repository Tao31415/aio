services:
  timescale:
    image: timescale/timescaledb-ha:pg17
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-aio}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - timescale_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_preload_libraries=timescaledb
      -c timescaledb.toolkit_management=true
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-aio}']
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:latest
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis}
    command: >
      redis-server
      --appendonly yes
      --requirepass "$REDIS_PASSWORD"
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "redis-cli -a '${REDIS_PASSWORD:-redis}' ping | grep PONG",
        ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:latest
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
    ports:
      - '${MOSQUITTO_PORT:-1883}:1883'
      - '${MOSQUITTO_WS_PORT:-1884}:1884'
      - '${MOSQUITTO_MQTTS_PORT:-8883}:8883'
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ['CMD-SHELL', 'timeout 5s nc -z localhost 1883 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  api:
    image: aio/api:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api
    env_file:
      - ../apps/api/.env.production
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - NODE_ENV=production
      - DB_HOST=${DB_HOST:-timescale}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-aio}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'timeout 5s nc -z localhost 3000 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  web:
    image: aio/web:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: web
    env_file:
      - ../apps/web/.env.production
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE=http://localhost
      - PORT=4000
    ports:
      - '${WEB_PORT:-4000}:4000'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'timeout 5s nc -z localhost 4000 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:latest
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
    ports:
      - '${NGINX_PORT:-80}:80'
      - '${NGINX_SSL_PORT:-443}:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      dozzle:
        condition: service_started
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_BASE=/dozzle
    ports: ['${DOZZLE_PORT:-8080}:8080']
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  timescale_data:
  redis_data:
  minio_data:
  mosquitto_data:
  mosquitto_log:
